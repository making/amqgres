spring.application.name=amqgres
spring.main.web-application-type=none

# Storage backend is selected by a Spring profile: "postgres" (default) or "sqlite".
# Activate one with, for example, --spring.profiles.active=sqlite. Each profile has its own
# application-${profile}.properties that sets amqgres.storage.type (which selects the
# storage beans) and the matching datasource.
spring.profiles.default=postgres

spring.datasource.hikari.maximum-pool-size=20

spring.sql.init.mode=always
# Applies schema-${platform}.sql, i.e. schema-postgres.sql or schema-sqlite.sql.
spring.sql.init.platform=${amqgres.storage.type}

amqgres.listen.host=0.0.0.0
amqgres.listen.port=5672
amqgres.link.initial-credit=100
amqgres.redelivery.max-count=5
amqgres.lock.timeout-seconds=30
amqgres.lock.reclaim-interval-seconds=5
# TLS is off by default. To enable it, set amqgres.tls.enabled=true and point
# amqgres.tls.bundle at a Spring Boot SSL bundle (spring.ssl.bundle.jks.* or
# spring.ssl.bundle.pem.*) carrying the server certificate and private key.
amqgres.tls.enabled=false
#amqgres.tls.bundle=amqgres
#spring.ssl.bundle.pem.amqgres.keystore.certificate=file:/etc/amqgres/server-cert.pem
#spring.ssl.bundle.pem.amqgres.keystore.private-key=file:/etc/amqgres/server-key.pem
amqgres.sasl.mechanism=PLAIN

logging.level.com.example.amqgres=INFO
