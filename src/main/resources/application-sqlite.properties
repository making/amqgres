amqgres.storage.type=sqlite

# Only the database file path is meant to be overridden; the WAL and busy_timeout parameters
# are effectively mandatory and are appended unconditionally below. Override just the path with,
# for example, --amqgres.sqlite.path=/data/amqgres.db.
amqgres.sqlite.path=/tmp/amqgres.db

# WAL plus a busy_timeout lets the pooled connections share SQLite's single writer without
# SQLITE_BUSY errors. A ':memory:' path is not usable because each pooled connection would
# open a separate database.
spring.datasource.url=jdbc:sqlite:${amqgres.sqlite.path}?journal_mode=WAL&busy_timeout=5000
